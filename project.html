<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintBoard</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <header class="navbar">

        <h1>🚀 SprintBoard</h1>

        <a href="dashboard.html" class="back-btn">
            ← Dashboard
        </a>

    </header>

    <div class="container">

        <!-- Create Task -->

        <section class="create-project">

            <h2>Create New Task</h2>

            <input
                id="taskTitle"
                placeholder="Task Title">

            <textarea
                id="taskDescription"
                placeholder="Task Description"></textarea>

            <select id="taskStatus">

                <option value="Todo">Todo</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>

            </select>

            <button id="createTaskBtn">

                + Create Task

            </button>

        </section>

        <!-- Kanban Board -->

        <section class="board">

            <div class="column">

                <h2>📋 Todo</h2>

                <div id="todo"></div>

            </div>

            <div class="column">

                <h2>🚧 In Progress</h2>

                <div id="progress"></div>

            </div>

            <div class="column">

                <h2>✅ Done</h2>

                <div id="done"></div>

            </div>

        </section>

    </div>

    <!-- Modal -->

    <div id="taskModal" class="modal">

        <div class="modal-content">

            <h2>Edit Task</h2>

            <input
                id="editTitle"
                placeholder="Task Title">

            <textarea
                id="editDescription"
                placeholder="Task Description"></textarea>

            <select id="editStatus">

                <option>Todo</option>
                <option>In Progress</option>
                <option>Done</option>

            </select>

            <label>Assign To</label>

            <select id="assignedTo">

                <option value="">Unassigned</option>

            </select>
            <div class="modal-buttons">

                <button id="saveTaskBtn">

                    💾 Save

                </button>

                <button id="deleteTaskBtn">

                    🗑 Delete

                </button>

                <button id="closeModalBtn">

                    ❌ Close

                </button>

            </div>

            <hr>

            <h3>💬 Comments</h3>

            <div id="commentList" class="comment-list"></div>

            <input
                id="commentInput"
                placeholder="Write a comment...">

            <button id="addCommentBtn">

                Add Comment

            </button>

        </div>

    </div>

    <script type="module" src="js/project.js"></script>

</body>

</html>
